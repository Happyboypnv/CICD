name: Cross-OS Testing

on: [push, pull_request]

jobs:
  test:
    name: Run tests on ${{ matrix.os }}
    # Sử dụng biến matrix.os để chỉ định hệ điều hành
    runs-on: ${{ matrix.os }}

    strategy:
      # Định nghĩa Matrix Strategy
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17' # Hoặc phiên bản Java dự án bạn dùng
          distribution: 'temurin'

      - name: Run Unit Tests
        # Lệnh chạy test (ví dụ với Maven)
        run: mvn test