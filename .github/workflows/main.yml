name: Java CI with Matrix, JaCoCo and Caching

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      # Matrix Strategy (Yêu cầu Bài 4)
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # --- CẤU HÌNH CACHING (Trọng tâm Bài 6) ---
          # Việc thêm dòng này giúp lưu lại thư mục ~/.m2/repository
          cache: 'maven'

      - name: Build with Maven
        # Chạy verify để kích hoạt cả Checkstyle (validate) và JaCoCo (verify)
        # Yêu cầu Bài 5
        run: mvn verify

      - name: Upload JaCoCo Report
        # Trích xuất báo cáo để xem lại (Yêu cầu Bài 5)
        uses: actions/upload-artifact@v4
        if: always() # Luôn chạy kể cả khi test fail hoặc coverage thấp
        with:
          name: jacoco-report-${{ matrix.os }}
          path: target/site/jacoco/