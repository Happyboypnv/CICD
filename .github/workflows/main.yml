name: Cross-OS Testing

on: [push, pull_request]

jobs:
  test:
    name: Run tests on ${{ matrix.os }}
    # Sử dụng biến matrix.os để chỉ định hệ điều hành
    runs-on: ${{ matrix.os }}

    strategy:
      # Định nghĩa Matrix Strategy
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Chạy test và xác minh mã nguồn (bao gồm cả JaCoCo check)
      - name: Run tests and verify coverage
        run: mvn verify

      # Lưu trữ báo cáo JaCoCo thành Artifact
      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always() # RẤT QUAN TRỌNG: Đảm bảo step này luôn chạy kể cả khi build fail (do coverage < 80%)
        with:
          name: jacoco-report-${{ matrix.os }} # Đổi tên artifact linh hoạt nếu bạn vẫn đang dùng Matrix từ Bài 4
          path: target/site/jacoco/
