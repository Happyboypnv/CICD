name: Java CI Full Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ] # Kích hoạt khi có PR hướng vào nhánh main (Yêu cầu Bài 7)

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Bước này chạy checkstyle và lưu kết quả ra file xml (Yêu cầu để Reviewer đọc)
      - name: Run Checkstyle
        run: mvn checkstyle:checkstyle

      # Gửi phản hồi trực tiếp (Inline Feedback) vào Pull Request
      - name: Checkstyle Reviewer
        uses: dbelyaev/action-checkstyle@master
        if: failure() || success() # Chạy kể cả khi bước trước đó có lỗi
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          level: warning # Hoặc error tùy bạn chọn

      - name: Build and Verify (JaCoCo 80%)
        run: mvn verify

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-${{ matrix.os }}
          path: target/site/jacoco/